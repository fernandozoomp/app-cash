<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Fundo verde esmeralda arredondado -->
  <rect width="512" height="512" rx="112" fill="#059669"/>
  <!-- Carteira estilizada (branca) -->
  <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Corpo da carteira -->
    <rect x="116" y="160" width="280" height="200" rx="28"/>
    <!-- Aba superior (onde dobra) -->
    <path d="M140 160 L140 120 Q140 100 160 100 L372 100 Q396 100 396 124 L396 160"/>
    <!-- Botão/fechamento circular -->
    <circle cx="356" cy="260" r="22" fill="#ffffff" stroke="none"/>
    <!-- Símbolo R$ estilizado dentro -->
  </g>
  <!-- Texto R$ no centro -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#ffffff" text-anchor="middle">R$</text>
</svg>
